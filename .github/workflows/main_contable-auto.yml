# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - contable-auto

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Verificación de dependencias y tests antes de desplegar.
      # Azure App Service (Oryx) instala requirements.txt en el servidor,
      # por lo que no hace falta empaquetar un venv ni subir artifacts.
      - name: Install dependencies and run tests
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest
          python -m pytest tests/ -q

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6B0C2D78C3AD4E43802A8C9E3A95C9F5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8C86C3F5B6124F628A8CEB4D2CB6E5DF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4619C51D7D694A5A9B6043F59F981454 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'contable-auto'
          slot-name: 'Production'
          package: '.'
